name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - name: Run Rust tests
        run: cargo test --features cli

      - name: Verify docs
        run: cargo xtask docs verify

      - name: Verify parity contract
        run: cargo xtask parity verify
