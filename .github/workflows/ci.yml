name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Run tests
        run: cargo test --all --all-features

      - name: Build docs
        run: python3 tools/build_docs.py

      - name: Validate docs links
        run: python3 tools/validate_docs_links.py docs

      - name: Validate docs examples
        run: python3 tools/check_docs_examples.py docs
