[book]
title = "Ranty Reference"
description = "Stable Ranty language, runtime, CLI, and standard-library reference."
authors = ["Ranty contributors"]
language = "en"
src = "docs-src"

[build]
build-dir = "docs"
create-missing = false

[output.html]
additional-css = ["theme/custom.css"]
default-theme = "ayu"
git-repository-url = "https://github.com/insanityfarm/ranty"
mathjax-support = false

[output.html.fold]
enable = true
level = 2

[output.html.print]
enable = false
